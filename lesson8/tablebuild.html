<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Build | Vicente Castillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/nomalize.css">
    <link rel="stylesheet" href="/lesson8/css/table.css">
</head>
<body>
    <table>
        <thead>
            <tr>
                <td colspan="3"><b>ACME Wildwest</b></td><br>
            </tr>
            <tr>
                <td><b>Period</b></td>
                <td><b>Sales</b></td>
                <td><b>Sales Goal</b></td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>August</th>
                <td>$3,590</td>
                <td>$4,000</td>
            </tr>
            <tr>
                <th>September</th>
                <td>$4,420</td>
                <td>$5,000</td>
            </tr>
            <tr>
                <th>October</th>
                <td>$4,870</td>
                <td>$5,000</td>
            </tr>
            <tr>
                <th>November</th>
                <td>$8,610</td>
                <td class="NovNum">$7,500</td><br>
            </tr>
            <tr>
                <th><i>Black Friday</i></th>
                <td colspan="2">$3,200</td><br>
            </tr>
            <tr>
                <th>December</th>
                <td>$6,820</td>
                <td>$7,500</td>
            </tr>
            <tfoot>
                <tr>
                    <td colspan="3">
                        Compiled 12.20.2020 by bRauls
                    </td>
                </tr>
            </tfoot>
        </tbody>
    </table>
</body>
</html>
